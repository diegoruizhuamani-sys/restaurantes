<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Restaurantes')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0" th:text="${title}">Restaurantes</h1>
        <span class="badge bg-secondary fs-6" th:text="|${numRestaurants} resultados|">0 resultados</span>
    </div>
    <!-- Opcional: agregar filtros -->

    <!-- Filtro por tipo comida
    /restaurants?foodType=SPANISH
    /restaurants?foodType=JAPANESE
    -->
    <a th:href="@{/restaurants(foodType='SPANISH')}" class="btn btn-sm btn-secondary">Comida española</a>
    <a th:href="@{/restaurants(foodType='JAPANESE')}" class="btn btn-sm btn-secondary">Comida japonesa</a>
    <a th:href="@{/restaurants(price=10)}" class="btn btn-sm btn-secondary">Hasta 10</a>
    <a th:href="@{/restaurants(price=20.5)}" class="btn btn-sm btn-secondary">Hasta 20.5</a>


    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" th:each="restaurant : ${restaurants}">
            <div class="card card-restaurant h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fa-solid fa-store text-primary me-2"></i>
                        <span th:text="${restaurant.name}">Nombre</span>
                    </h5>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <i class="fa-solid fa-euro-sign me-1"></i>
                            <span th:text="${restaurant.averagePrice}">0</span>
                        </span>
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0 pt-0">
                    <!-- Botón de Ver restaurante que lleva al restaurant-detail.html -->
                    <a th:href="@{/restaurants/{id}(id=${restaurant.id})}"
                       class="btn btn-outline-primary btn-sm w-100">
                        <i class="fa-regular fa-eye me-1"></i> Ver restaurante
                    </a>
                    <!-- Botón Desactivar restaurante que cambia Active a false y hace redirect a list -->
                    <a th:href="@{/restaurants/deactivate/{id}(id=${restaurant.id})}"
                       class="btn btn-warning btn-sm w-100 mt-2">
                        <i class="fa-solid fa-ban me-1"></i> Desactivar restaurante
                    </a>

                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/restaurants/create}" class="btn btn-success">
            <i class="fa-solid fa-plus me-1"></i> Crear restaurante
        </a>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
