<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Restaurantes')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h1 class="mb-0" th:text="${title}">Restaurantes</h1>
        <span class="badge bg-secondary fs-6" th:text="|${numRestaurants} resultados|">0 resultados</span>
    </div>
    <!-- Opcional: agregar filtros -->

    <!-- Filtro por tipo comida
    /restaurants?foodType=SPANISH
    /restaurants?foodType=JAPANESE
    -->
    <a th:href="@{/restaurants/new}" class="btn btn-primary btn-sm mb-2">
        <i class="fa-solid fa-plus"></i>
        Crear restaurante
    </a>

    <div class="mb-3">
        <h5>Filtros rápidos</h5>
        <a th:href="@{/restaurants}" class="btn btn-sm btn-primary">Todos</a>
        <a th:href="@{/restaurants(foodType='SPANISH')}" class="btn btn-sm btn-secondary">Comida española</a>
        <a th:href="@{/restaurants(foodType='JAPANESE')}" class="btn btn-sm btn-secondary">Comida japonesa</a>
        <a th:href="@{/restaurants(price=15)}" class="btn btn-sm btn-success">Hasta 15 €</a>
        <a th:href="@{/restaurants(price=30)}" class="btn btn-sm btn-success">Hasta 30 €</a>
        <a th:href="@{/restaurants(title='pizza')}" class="btn btn-sm btn-warning">Pizza</a>
        <a th:href="@{/restaurants(title='burguer')}" class="btn btn-sm btn-warning">Burguer</a>
        <a th:href="@{/restaurants(title='paella')}" class="btn btn-sm btn-warning">Paella</a>
    </div>

    <div class="mb-3">
        <h5>Búsqueda avanzada</h5>
        <form th:action="@{/restaurants}" method="get" class="row align-items-end">

            <!-- Filtro por palabra en título -->
            <div class="col-auto">
                <label class="form-label form-label-sm">Título</label>
                <input type="text" name="title" class="form-control form-control-sm"
                       placeholder="Busca por título..." th:value="${param.title}">
            </div>
            <!-- Filtro por precio -->
            <div class="col-auto">
                <label class="form-label form-label-sm">Precio máx.</label>
                <input type="number" min="10" step="5" name="price"
                       class="form-control form-control-sm" th:value="${param.price}">
            </div>
            <!-- Filtro por foodType con selector -->
            <div class="col-auto">
                <label class="form-label form-label-sm">Tipo comida</label>
                <select name="foodType" class="form-select form-select-sm">
                    <option value="" th:selected="${param.foodType == null}">Todas</option>
                    <option value="SPANISH" th:selected="${param.foodType != null and param.foodType[0] == 'SPANISH'}">Española</option>
                    <option value="JAPANESE" th:selected="${param.foodType != null and param.foodType[0] == 'JAPANESE'}">Japonesa</option>
                </select>
            </div>

            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Buscar
                </button>
                <a th:href="@{/restaurants}" class="btn btn-danger btn-sm">
                    <i class="fa-solid fa-broom"></i>
                    Limpiar filtros
                </a>
            </div>

        </form>

    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" th:each="restaurant : ${restaurants}">
            <div class="card card-restaurant h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fa-solid fa-store text-primary me-2"></i>
                        <span th:text="${restaurant.name}">Nombre</span>
                    </h5>
                    <p class="card-text">
                        <span class="badge bg-success">
                            <i class="fa-solid fa-euro-sign me-1"></i>
                            <span th:text="${restaurant.averagePrice}">0</span>
                        </span>
                    </p>
                </div>
                <div class="card-footer bg-transparent border-0 pt-0">
                    <!-- Botón de Ver restaurante que lleva al restaurant-detail.html -->
                    <a th:href="@{/restaurants/{id}(id=${restaurant.id})}"
                       class="btn btn-primary btn-sm w-100">
                        <i class="fa-regular fa-eye me-1"></i> Ver
                    </a>
                    <!-- Botón Desactivar restaurante que cambia Active a false y hace redirect a list -->
                    <a th:href="@{/restaurants/deactivate/{id}(id=${restaurant.id})}"
                       class="btn btn-warning btn-sm w-100 mt-2">
                        <i class="fa-solid fa-ban me-1"></i> Desactivar
                    </a>

                    <a th:href="@{/restaurants/edit/{id}(id=${restaurant.id})}"
                       class="btn btn-success btn-sm w-100 mt-2">
                        <i class="fa-solid fa-pencil me-1"></i> Editar
                    </a>

                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
