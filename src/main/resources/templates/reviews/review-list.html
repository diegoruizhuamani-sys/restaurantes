<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado Restaurantes</title>
</head>
<body>


<h1>Opiniones de clientes</h1>
<ul>
    <li th:each="review : ${reviews}">
        <p th:text="${review.title}"></p>
        <p th:text="${review.description}"></p>
        <p th:text="${'Valoracion: ' + review.rating + '/5 estrellas'}"></p>
        <p th:text="${'Fecha: ' + review.creationDate}"></p>

        <p th:if="${review.restaurante.name}"></p>
        <a th:href="@{/restaurantes/{id}(id=${review.restaurante.id})}">Ver restaurante</a>
    </li>
</ul>






</body>
</html>
