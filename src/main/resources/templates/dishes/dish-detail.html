<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Detalle Plato')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">

    <!-- Card con los datos del plato -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="card-title mb-3" th:text="'Plato ' + ${dish.id}">Plato</h1>

            <dl class="row mb-0">
                <dt class="col-sm-3"><i class="fa-solid fa-tag me-1"></i> Nombre</dt>
                <dd class="col-sm-9" th:text="${dish.name}"></dd>

                <dt class="col-sm-3"><i class="fa-solid fa-euro-sign me-1"></i> Precio</dt>
                <dd class="col-sm-9" th:text="${dish.price != null ? dish.price + ' €' : 'Sin precio'}"></dd>

                <dt class="col-sm-3"><i class="fa-regular fa-pen-to-square me-1"></i> Descripción</dt>
                <dd class="col-sm-9" th:text="${dish.description != null ? dish.description : 'Sin descripción'}"></dd>

                <dt class="col-sm-3"><i class="fa-solid fa-list me-1"></i> Tipo</dt>
                <dd class="col-sm-9">
                    <span th:switch="${dish.dishType}">
                        <span class="badge bg-success" th:case="${T(com.example.model.Enum.DishType).STARTER}">🥬 Entrantes de la tierrina</span>
                        <span class="badge bg-primary" th:case="${T(com.example.model.Enum.DishType).MAIN}">🐟 Principales</span>
                        <span class="badge bg-warning text-dark" th:case="${T(com.example.model.Enum.DishType).DESSERT}">🍦 Postres</span>
                        <span class="badge bg-secondary" th:case="*">No definido</span>
                    </span>
                </dd>
            </dl>
        </div>

        <div class="card-footer bg-transparent" th:if="${dish.restaurant != null}">
            <i class="fa-solid fa-store text-primary me-1"></i>
            Este plato pertenece al restaurante
            <a class="fw-semibold"
               th:href="@{/restaurants/{id}(id=${dish.restaurant.id})}"
               th:text="${dish.restaurant.name}"></a>
        </div>
    </div>

    <!-- Opiniones del plato -->
    <h2 class="mt-5">
        <i class="fa-regular fa-comments text-primary me-2"></i> Opiniones sobre este plato
    </h2>

    <div th:if="${reviews.isEmpty()}" class="alert alert-light border">
        <i class="fa-regular fa-face-smile me-1"></i>
        Nadie ha comentado todavía, sé el primero en escribir una opinión.
    </div>

    <div class="row row-cols-1 row-cols-md-2 g-3" th:unless="${reviews.isEmpty()}">
        <div class="col" th:each="review : ${reviews}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${review.title}">Título</h5>
                    <p class="card-text" th:text="${review.description}">Descripción</p>
                    <span class="badge bg-warning text-dark">
                        <i class="fa-solid fa-star me-1"></i>
                        <span th:text="${review.rating + ' / 5'}"></span>
                    </span>
                </div>
                <div class="card-footer text-muted small bg-transparent">
                    <i class="fa-regular fa-calendar me-1"></i>
                    <span th:text="${review.creationDate}"></span>
                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
